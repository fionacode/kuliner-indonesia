<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definition of gradients and filters -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fefae0" />
      <stop offset="100%" stop-color="#dda15e" />
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circular badge -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" stroke="#bc6c25" stroke-width="3" filter="url(#shadow)" />

  <!-- Body/Traditional Batik Shirt -->
  <path d="M 30,85 C 30,71 70,71 70,85 Z" fill="#dda15e" stroke="#606c38" stroke-width="2" />
  <!-- Batik motif circles and lines on shirt -->
  <circle cx="40" cy="80" r="2.5" fill="#606c38" />
  <circle cx="50" cy="80" r="2.5" fill="#606c38" />
  <circle cx="60" cy="80" r="2.5" fill="#606c38" />
  <circle cx="45" cy="84" r="1.5" fill="#bc6c25" />
  <circle cx="55" cy="84" r="1.5" fill="#bc6c25" />

  <!-- Neck -->
  <rect x="45" y="65" width="10" height="10" rx="2" fill="#ffdfba" stroke="#bc6c25" stroke-width="1.5" />

  <!-- Face -->
  <circle cx="50" cy="50" r="22" fill="#ffdfba" stroke="#bc6c25" stroke-width="1.5" />

  <!-- Cheeks (Blush) -->
  <circle cx="36" cy="54" r="3.5" fill="#ffb7b2" opacity="0.6" />
  <circle cx="64" cy="54" r="3.5" fill="#ffb7b2" opacity="0.6" />

  <!-- Eyes -->
  <circle cx="42" cy="48" r="3.5" fill="#1d3557" />
  <circle cx="43" cy="46.5" r="1.2" fill="#ffffff" />
  <circle cx="58" cy="48" r="3.5" fill="#1d3557" />
  <circle cx="59" cy="46.5" r="1.2" fill="#ffffff" />

  <!-- Eyebrows -->
  <path d="M 37,42 Q 42,40 45,43" fill="none" stroke="#6d4c41" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 63,42 Q 58,40 55,43" fill="none" stroke="#6d4c41" stroke-width="1.5" stroke-linecap="round" />

  <!-- Smile -->
  <path d="M 44,56 Q 50,62 56,56" fill="none" stroke="#606c38" stroke-width="2" stroke-linecap="round" />

  <!-- Blangkon (Javanese Traditional Headwear) -->
  <!-- Blangkon shape wrapping the head -->
  <path d="M 28,40 C 27,25 73,25 72,40 Z" fill="#6d4c41" stroke="#4e342e" stroke-width="1.5" />
  <!-- Diagonal stripes of batik cloth -->
  <path d="M 32,32 Q 50,22 68,32" fill="none" stroke="#bc6c25" stroke-width="2" />
  <path d="M 36,36 Q 50,26 64,36" fill="none" stroke="#bc6c25" stroke-width="2" />
  <path d="M 40,40 Q 50,30 60,40" fill="none" stroke="#bc6c25" stroke-width="2" />
  <!-- Front wrap point -->
  <path d="M 50,32 L 53,35 L 50,38 L 47,35 Z" fill="#bc6c25" />
  <!-- Back bun (Mondholan) -->
  <circle cx="50" cy="22" r="5" fill="#6d4c41" stroke="#4e342e" stroke-width="1.5" />
</svg>
