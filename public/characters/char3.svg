<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definition of gradients and filters -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8f3dc" />
      <stop offset="100%" stop-color="#b7e4c7" />
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circular badge -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" stroke="#2d6a4f" stroke-width="3" filter="url(#shadow)" />

  <!-- Body/T-Shirt -->
  <path d="M 30,85 C 30,71 70,71 70,85 Z" fill="#40916c" stroke="#1b4332" stroke-width="2" />
  
  <!-- Camera strap and camera around neck -->
  <path d="M 38,71 Q 50,83 62,71" fill="none" stroke="#2b2d42" stroke-width="2" />
  <!-- Camera body -->
  <rect x="42" y="77" width="16" height="10" rx="2" fill="#52b788" stroke="#1b4332" stroke-width="1.5" />
  <circle cx="50" cy="82" r="3" fill="#1b4332" />
  <rect x="44" y="75" width="4" height="2" fill="#2d6a4f" />

  <!-- Neck -->
  <rect x="45" y="65" width="10" height="10" rx="2" fill="#ffd8be" stroke="#e09f6d" stroke-width="1.5" />

  <!-- Face -->
  <circle cx="50" cy="50" r="22" fill="#ffd8be" stroke="#e09f6d" stroke-width="1.5" />

  <!-- Glasses -->
  <circle cx="41" cy="48" r="7" fill="none" stroke="#1b4332" stroke-width="2" />
  <circle cx="59" cy="48" r="7" fill="none" stroke="#1b4332" stroke-width="2" />
  <line x1="48" y1="48" x2="52" y2="48" stroke="#1b4332" stroke-width="2" />
  <line x1="34" y1="48" x2="31" y2="46" stroke="#1b4332" stroke-width="1.5" />
  <line x1="66" y1="48" x2="69" y2="46" stroke="#1b4332" stroke-width="1.5" />

  <!-- Cheeks (Blush) -->
  <circle cx="36" cy="54" r="3.5" fill="#ffb7b2" opacity="0.6" />
  <circle cx="64" cy="54" r="3.5" fill="#ffb7b2" opacity="0.6" />

  <!-- Eyes inside glasses -->
  <circle cx="41" cy="48" r="2" fill="#1d3557" />
  <circle cx="59" cy="48" r="2" fill="#1d3557" />

  <!-- Smile -->
  <path d="M 45,57 Q 50,62 55,57" fill="none" stroke="#1b4332" stroke-width="2" stroke-linecap="round" />

  <!-- Hair (peeking under hat) -->
  <path d="M 28,48 Q 26,38 34,31 Q 42,28 50,32 Q 58,28 66,31 Q 74,38 72,48" fill="none" stroke="#582f0e" stroke-width="4.5" stroke-linecap="round" />
  <!-- Hair buns -->
  <circle cx="30" cy="28" r="6" fill="#582f0e" />
  <circle cx="70" cy="28" r="6" fill="#582f0e" />
</svg>
